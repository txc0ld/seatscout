name: Feature request
description: Propose a product, data, or UX improvement for SeatScout.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how?
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Include venue markets, examples, or references if helpful.
